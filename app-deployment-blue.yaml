apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue

spec:
  replicas: 2

  selector:
    matchLabels:
      app: sample-app
      version: blue

  template:
    metadata:
      labels:
        app: sample-app
        version: blue

    spec:
      containers:
      - name: sample-app
        image: yourdockerhubuser/sample-app:v1
